{% extends "base.html" %}

{% block title %}Accès refusé - FASSIE{% endblock %}

{% block content %}
    <section class="error-section">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <div class="error-content">
                        <h1 class="error-code">403</h1>
                        <h2 class="error-title">Accès refusé</h2>
                        <p class="error-message">Vous n'avez pas les permissions nécessaires pour accéder à cette page.</p>
                        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
                            <i class="fas fa-home"></i> Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}

{% block extra_css %}
    <style>
        .error-section {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
        }
        
        .error-content {
            text-align: center;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary-green);
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        .error-title {
            font-size: 2rem;
            color: var(--dark-gray);
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.25rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }
    </style>
{% endblock %}
